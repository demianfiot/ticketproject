services:

  ticket-service:
    build: ./ticket-service
    env_file:
      - ticket-service/.env
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_started
      clickhouse:
        condition: service_started
      ai-service:
        condition: service_started
    networks:
      - ticket-network
    restart: unless-stopped

  auth-service:
    build: ./auth-service
    env_file:
      - auth-service/.env
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ticket-network
    restart: unless-stopped

  ai-service:
    build: ./ai-service
    env_file:
      - ai-service/.env
    ports:
      - "50051:50051"
    networks:
      - ticket-network
    restart: unless-stopped

  consumer:
    build:
      context: ./ticket-service
      dockerfile: Dockerfile.consumer
    env_file:
      - .env
    depends_on:
      redpanda:
        condition: service_started
      clickhouse:
        condition: service_healthy
    networks:
      - ticket-network
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: supportflow-postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - ticket-network
    restart: unless-stopped

  redpanda:
    image: redpandadata/redpanda:latest
    container_name: supportflow-redpanda
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - "512M"
      - --reserve-memory
      - "0M"
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:19092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092,OUTSIDE://127.0.0.1:19092
    ports:
      - "9092:9092"
      - "19092:19092"
    networks:
      - ticket-network
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: supportflow-clickhouse
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickhouse_password
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user default --password clickhouse_password --query 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - ticket-network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus
    container_name: supportflow-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./deployments/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - ticket-network
    restart: unless-stopped
  
  grafana:
    image: grafana/grafana
    container_name: supportflow-grafana
    ports:
      - "3000:3000"
    networks:
      - ticket-network
    restart: unless-stopped

volumes:
  postgres_data:
  clickhouse_data:

networks:
  ticket-network:
    driver: bridge