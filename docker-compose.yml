services:
  postgres:
    image: postgres:15-alpine
    container_name: supportflow-postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - ticket-network
    restart: unless-stopped

  redpanda:
    image: redpandadata/redpanda:latest
    container_name: supportflow-redpanda
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - "512M"
      - --reserve-memory
      - "0M"
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:19092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092,OUTSIDE://127.0.0.1:19092
    ports:
      - "9092:9092"
      - "19092:19092"
    networks:
      - ticket-network

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: supportflow-clickhouse
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickhouse_password
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    networks:
      - ticket-network

  prometheus:
    image: prom/prometheus
    container_name: supportflow-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./deployments/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    extra_hosts:
      - "host.docker.internal:host-gateway"
  
  grafana:
    image: grafana/grafana
    container_name: supportflow-grafana
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  clickhouse_data:

networks:
  ticket-network:
    driver: bridge